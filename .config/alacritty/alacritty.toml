# Configuration for Alacritty

[font]
normal = { family = "JetBrains Mono", style = "Medium" }
bold = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }
bold_italic = { family = "JetBrains Mono", style = "BoldItalic" }
size = 10

[colors.primary]
foreground = "#cecdc3"
background = "#100f0f"

[colors.normal]
black = "#100f0f"
red = "#af3029"
green = "#66800b"
yellow = "#ad8301"
blue = "#205ea6"
magenta = "#a02f6f"
cyan = "#24837b"
white = "#878580"

[colors.bright]
black = "#1c1b1a"
red = "#d14d41"
green = "#879a39"
yellow = "#d0a215"
blue = "#4385be"
magenta = "#ce5d97"
cyan = "#3aa99f"
white = "#cecdc3"

[bell]
duration = 200
color = "#af3029"

[cursor]
style = { shape = "Underline", blinking = "Always" }

[terminal]
shell = "/usr/bin/fish"

[mouse]
hide_when_typing = true
